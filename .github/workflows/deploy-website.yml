name: Deploy Website to Vercel

on:
  push:
    branches:
      - main
    paths:
      - 'website-nextjs/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy
        run: |
          echo "Triggering Vercel deployment..."
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_xK8ZnWM2jxkBRgtxYPeZ0uOjKLSv/DMKtCi3dZR"
          echo "Done!"
